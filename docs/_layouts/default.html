<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .nav {
            margin-bottom: 30px;
        }
        .nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #0366d6;
        }
        .nav a:hover {
            text-decoration: underline;
        }
        .content {
            margin-bottom: 40px;
        }
        .toc {
            background: #f6f8fa;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .toc h3 {
            margin-top: 0;
        }
        .toc ul {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><a href="{{ "/" | relative_url }}">{{ site.title }}</a></h1>
        <p>{{ site.description }}</p>
    </div>
    
    <div class="nav">
        <a href="{{ "/" | relative_url }}">Home</a>
        <a href="{{ "/start" | relative_url }}">Getting Started</a>
        <a href="{{ "/channels" | relative_url }}">Channels</a>
        <a href="{{ "/gateway" | relative_url }}">Gateway</a>
        <a href="https://github.com/JonusNattapong/lala">GitHub</a>
    </div>
    
    <div class="content">
        {{ content }}
    </div>
    
    <footer>
        <p>&copy; 2026 Lala Project. Documentation available under <a href="https://github.com/JonusNattapong/lala/blob/main/LICENSE">MIT License</a>.</p>
    </footer>
</body>
</html>
