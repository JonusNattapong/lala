theme: jekyll-theme-minimal
title: Lala Documentation
description: Self-hosted gateway for AI agents across messaging platforms
baseurl: "/lala"
url: "https://jonusnattapong.github.io"

# Enable Markdown processing with GitHub Flavored Markdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Include all Markdown files
include:
  - "_pages"
  - "*.md"
  - "**/*.md"

# Exclude files from processing
exclude:
  - package.json
  - package-lock.json
  - node_modules/
  - .git/
  - .gitignore
  - docs.json
  - .i18n/
  - assets/src/
  - "*.mjs"
  - "tsconfig.*"
  - "pnpm-*"
  - "*.log"

# Default values
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Collections for better organization
collections:
  pages:
    output: true
    permalink: /:collection/:name/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO and social
logo: "/assets/lala-logo-text.png"
twitter:
  username: lala_ai
  card: summary

# Google Analytics (if needed)
google_analytics: false

# Build settings
sass:
  style: compressed
  sass_dir: _sass

# Incremental build
incremental: false
