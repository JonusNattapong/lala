services:
  - type: web
    name: lala
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: LALA_STATE_DIR
        value: /data/.lala
      - key: LALA_WORKSPACE_DIR
        value: /data/workspace
      - key: LALA_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: lala-data
      mountPath: /data
      sizeGB: 1
